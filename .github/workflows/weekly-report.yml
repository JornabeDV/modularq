name: Weekly Analytics Report

on:
  schedule:
    # Cada viernes a las 8 PM UTC (5 PM Argentina, UTC-3)
    - cron: '0 20 * * 5'

  # Permite ejecutar manualmente desde GitHub para testear
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Weekly Report PDF
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          DATE=$(date +%Y%m%d_%H%M%S)
          REPORT_FILE="reporte_semanal_${DATE}.pdf"
          HUMAN_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')

          echo "📊 Generating weekly report..."

          HTTP_STATUS=$(curl -s -o "$REPORT_FILE" -w "%{http_code}" \
            -X POST "$APP_URL/api/reports/generate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"period":"week"}')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: API returned status $HTTP_STATUS"
            cat "$REPORT_FILE"
            exit 1
          fi

          SIZE=$(stat -c%s "$REPORT_FILE")
          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ ERROR: Report file is too small ($SIZE bytes) — likely an error response"
            cat "$REPORT_FILE"
            exit 1
          fi

          echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_ENV
          echo "REPORT_DATE=$HUMAN_DATE" >> $GITHUB_ENV
          echo "✅ Report generated: $REPORT_FILE ($SIZE bytes)"

      - name: Send Report by Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📊 Reporte Semanal ModulArq — ${{ env.REPORT_DATE }}"
          to: ${{ secrets.OWNER_EMAIL }}, ${{ secrets.ARCHITECT_EMAIL }}, ${{ secrets.DEV_EMAIL }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            📊 Reporte Semanal generado automáticamente

            📁 Adjunto: ${{ env.REPORT_FILE }}
            🗓️ Fecha de generación: ${{ env.REPORT_DATE }}
            🔗 Ver detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ env.REPORT_FILE }}
